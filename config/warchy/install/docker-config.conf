# Configuration for Docker
# Moves ~/.docker to ~/.config/docker following XDG Base Directory specification

[env]
DOCKER_CONFIG="$XDG_CONFIG_HOME/docker"

[post-install]
# Migrate existing ~/.docker to XDG location if needed
if [[ -d "$HOME/.docker" && ! -d "${XDG_CONFIG_HOME:-$HOME/.config}/docker" ]]; then
  gum style --foreground 245 "  → Migrating Docker config from ~/.docker to ${XDG_CONFIG_HOME:-$HOME/.config}/docker"
  mkdir -p "${XDG_CONFIG_HOME:-$HOME/.config}"
  mv "$HOME/.docker" "${XDG_CONFIG_HOME:-$HOME/.config}/docker"
fi

[post-remove]
# Preserve Docker config when removing (it's user data, not a package)
true
