# Configuration file for Claude Code — Anthropic's AI coding assistant
#
# Installs the Claude Code CLI globally via npm.
# After install, run `claude` to authenticate and start coding.

[git]
GIT_REPO=https://github.com/anthropics/claude-code.git
BINARY_NAME=claude

[dependencies]
BUILD_DEPS=npm
TEMP_BUILD_DEPS=

[version]
claude --version 2>/dev/null | grep -oP '[0-9]+\.[0-9]+\.[0-9]+' | head -1

[build]
npm install -g --allow-scripts=@anthropic-ai/claude-code @anthropic-ai/claude-code

[post-install]
# XDG Base Directory compliance: migrate ~/.claude to $XDG_CONFIG_HOME/claude
if [[ -d "$HOME/.claude" && ! -d "${XDG_CONFIG_HOME:-$HOME/.config}/claude" ]]; then
  gum style --foreground 245 "  → Migrating Claude config from ~/.claude to ${XDG_CONFIG_HOME:-$HOME/.config}/claude"
  mkdir -p "${XDG_CONFIG_HOME:-$HOME/.config}"
  mv "$HOME/.claude" "${XDG_CONFIG_HOME:-$HOME/.config}/claude"
fi

[uninstall]
npm uninstall -g @anthropic-ai/claude-code >/dev/null 2>&1 || true

[post-remove]
# Preserve Claude config and auth when removing (credentials, settings, projects)
true
