# Configuration file for mcpc - Universal MCP CLI client
#
# A CLI client for the Model Context Protocol (MCP) that maps MCP operations
# to intuitive commands for interactive shell use, scripting, and AI agents.
# Supports persistent sessions, stdio/HTTP, OAuth 2.1, and JSON output.

[git]
GIT_REPO=https://github.com/apify/mcpc.git
BINARY_NAME=mcpc

[dependencies]
BUILD_DEPS=npm
TEMP_BUILD_DEPS=

[env]
MCPC_HOME_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/mcpc"

[version]
mcpc --version 2>/dev/null | grep -oP '[0-9]+\.[0-9]+\.[0-9]+' | head -1

[build]
npm install -g @apify/mcpc

[post-install]
# XDG Base Directory compliance: migrate ~/.mcpc to $XDG_DATA_HOME/mcpc
if [[ -d "$HOME/.mcpc" && ! -d "${XDG_DATA_HOME:-$HOME/.local/share}/mcpc" ]]; then
  gum style --foreground 245 "  → Migrating mcpc data from ~/.mcpc to ${XDG_DATA_HOME:-$HOME/.local/share}/mcpc"
  mkdir -p "${XDG_DATA_HOME:-$HOME/.local/share}"
  mv "$HOME/.mcpc" "${XDG_DATA_HOME:-$HOME/.local/share}/mcpc"
fi

[uninstall]
npm uninstall -g @apify/mcpc >/dev/null 2>&1 || true

[post-remove]
# Preserve mcpc data when removing (sessions, profiles, credentials)
true
