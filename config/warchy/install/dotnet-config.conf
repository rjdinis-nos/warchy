# Configuration for .NET runtime
# Moves ~/.dotnet to ~/.config/dotnet following XDG Base Directory specification
# .dotnet directory is typically created by VSCode for C# development

[env]
DOTNET_CLI_HOME="$XDG_CONFIG_HOME/dotnet"

[post-install]
# Migrate existing ~/.dotnet to XDG location if needed
if [[ -d "$HOME/.dotnet" && ! -d "${XDG_CONFIG_HOME:-$HOME/.config}/dotnet" ]]; then
  gum style --foreground 245 "  → Migrating .NET config from ~/.dotnet to ${XDG_CONFIG_HOME:-$HOME/.config}/dotnet"
  mkdir -p "${XDG_CONFIG_HOME:-$HOME/.config}"
  mv "$HOME/.dotnet" "${XDG_CONFIG_HOME:-$HOME/.config}/dotnet"
fi

[post-remove]
# Preserve .NET config when removing (it's user data, not a package)
true
