# Configuration for pass (the standard Unix password manager)
# Relies on gnupg.conf being loaded first — GNUPGHOME, pinentry, and gnome-keyring
# are all inherited from that setup.

[env]
PASSWORD_STORE_DIR="$HOME/.ssh/password-store"

[post-install]
# Clipboard copy (pass -c) requires wl-copy (wl-clipboard) on Wayland or xclip on X11.
# wl-clipboard is already installed by warchy-optional.packages.
# Verify the clipboard backend is reachable at runtime:
if ! command -v wl-copy &>/dev/null && ! command -v xclip &>/dev/null; then
  gum style --foreground 3 "  ⚠ pass: no clipboard backend found (wl-copy / xclip). 'pass -c' will not work."
else
  gum style --foreground 2 "  ✓ pass clipboard backend available"
fi

gum style --foreground 245 "  → Password store will be at \$HOME/.ssh/password-store"
gum style --foreground 245 "  → Init with: pass init <your-gpg-key-id>"

[post-remove]
# Password store is user data — never remove it automatically
true
