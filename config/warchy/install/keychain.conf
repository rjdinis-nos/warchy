# Configuration for keychain
# Moves ~/.keychain to ~/.ssh/.keychain for better organization with SSH keys

[env]
KEYCHAIN_DIR="$HOME/.ssh/.keychain"

[post-install]
# Migrate existing ~/.keychain to ~/.ssh/.keychain if needed
if [[ -d "$HOME/.keychain" && ! -d "$HOME/.ssh/.keychain" ]]; then
  gum style --foreground 245 "  → Migrating keychain from ~/.keychain to ~/.ssh/.keychain"
  mkdir -p "$HOME/.ssh"
  mv "$HOME/.keychain" "$HOME/.ssh/.keychain"
fi

[post-remove]
# Preserve keychain config when removing (it's user data, not a package)
true
