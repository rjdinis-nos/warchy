# Configuration for GnuPG
# Moves ~/.gnupg to ~/.ssh/gnupg for better organization with SSH keys

[env]
GNUPGHOME="$HOME/.ssh/gnupg"

[post-install]
# Migrate existing ~/.gnupg to ~/.ssh/gnupg if needed
if [[ -d "$HOME/.gnupg" && ! -d "$HOME/.ssh/gnupg" ]]; then
  gum style --foreground 245 "  → Migrating gnupg from ~/.gnupg to ~/.ssh/gnupg"
  mkdir -p "$HOME/.ssh"
  mv "$HOME/.gnupg" "$HOME/.ssh/gnupg"
fi

# Configure gpg-agent to use pinentry-gnome3 (stores passphrase in gnome-keyring)
mkdir -p "$HOME/.ssh/gnupg"
if [[ ! -f "$HOME/.ssh/gnupg/gpg-agent.conf" ]] || ! grep -q "pinentry-program" "$HOME/.ssh/gnupg/gpg-agent.conf"; then
  cat > "$HOME/.ssh/gnupg/gpg-agent.conf" << 'AGENTCONF'
pinentry-program /usr/bin/pinentry-gnome3
allow-loopback-pinentry
AGENTCONF
  gum style --foreground 245 "  → Configured gpg-agent to use pinentry-gnome3 (keyring-backed passphrase)"
fi

[post-remove]
# Preserve gnupg config when removing (it's user data, not a package)
true
