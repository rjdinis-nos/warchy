# Configuration file for GitHub Copilot CLI
#
# Uses npm as dependency and installs Copilot CLI globally.

[git]
GIT_REPO=https://github.com/github/copilot-cli.git
BINARY_NAME=copilot

[dependencies]
BUILD_DEPS=npm
TEMP_BUILD_DEPS=

[version]
copilot --version 2>/dev/null | grep -oP '[0-9]+\.[0-9]+\.[0-9]+' | head -1

[build]
npm_config_ignore_scripts=false npm install -g @github/copilot
_arch=$(node -e "process.stdout.write(process.arch)")
_version=$(node -e "process.stdout.write(require('${NPM_CONFIG_PREFIX}/lib/node_modules/@github/copilot/package.json').version)")
npm install -g "@github/copilot-linux-${_arch}@${_version}" 2>/dev/null || true

[uninstall]
npm uninstall -g @github/copilot >/dev/null 2>&1 || true
_arch=$(node -e "process.stdout.write(process.arch)")
npm uninstall -g "@github/copilot-linux-${_arch}" >/dev/null 2>&1 || true
