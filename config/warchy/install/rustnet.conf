[package]
PACKAGE_NAME=rustnet
PACKAGE_INSTALLER=pacman

[post-install]
# Grant capabilities so rustnet runs without sudo
rustnet_bin="$(command -v rustnet 2>/dev/null || true)"
if [[ -n "$rustnet_bin" ]]; then
    gum style --foreground 245 "  → Granting cap_net_raw,cap_bpf,cap_perfmon to $rustnet_bin"
    sudo setcap 'cap_net_raw,cap_bpf,cap_perfmon+eip' "$rustnet_bin"
    gum style --foreground 2 "  → rustnet ready (run: rustnet)"
else
    gum style --foreground 1 "  → rustnet binary not found in PATH, skipping setcap"
fi

[post-remove]
# Nothing to clean up; pacman removes the binary and its capabilities
