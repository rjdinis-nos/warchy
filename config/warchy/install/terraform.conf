[package]
PACKAGE_NAME=terraform
PACKAGE_INSTALLER=pacman

[env]
TF_CLI_CONFIG_FILE="$XDG_CONFIG_HOME/terraform/terraform.rc"

[pre-install]
mkdir -p "$XDG_CONFIG_HOME/terraform"
mkdir -p "$XDG_CACHE_HOME/terraform/plugins"

[post-install]
# Write CLI config if it doesn't already exist
if [[ ! -f "$XDG_CONFIG_HOME/terraform/terraform.rc" ]]; then
  cat > "$XDG_CONFIG_HOME/terraform/terraform.rc" <<'EOF'
disable_checkpoint = true
plugin_cache_dir   = "${HOME}/.cache/terraform/plugins"
EOF
fi

# Migrate existing ~/.terraform.d if present
if [[ -d "$HOME/.terraform.d" ]]; then
  gum style --foreground 245 "  → Removing ~/.terraform.d (only checkpoint files, safe to delete)"
  rm -rf "$HOME/.terraform.d"
fi

[post-remove]
rm -rf "${XDG_CONFIG_HOME:-$HOME/.config}/terraform"
rm -rf "${XDG_CACHE_HOME:-$HOME/.cache}/terraform"
