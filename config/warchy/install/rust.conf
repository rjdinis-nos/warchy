[package]
PACKAGE_NAME=rustup
PACKAGE_INSTALLER=pacman

[env]
RUSTUP_HOME="$XDG_DATA_HOME/rustup"
CARGO_HOME="$XDG_DATA_HOME/cargo"

[post-install]
# Migrate existing rustup/cargo if they exist in old locations
if [[ -d "$HOME/.rustup" && ! -d "$XDG_DATA_HOME/rustup" ]]; then
  gum style --foreground 245 "  → Migrating rustup from ~/.rustup to $XDG_DATA_HOME/rustup"
  mkdir -p "$XDG_DATA_HOME"
  mv "$HOME/.rustup" "$XDG_DATA_HOME/rustup"
fi
if [[ -d "$HOME/.cargo" && ! -d "$XDG_DATA_HOME/cargo" ]]; then
  gum style --foreground 245 "  → Migrating cargo from ~/.cargo to $XDG_DATA_HOME/cargo"
  mkdir -p "$XDG_DATA_HOME"
  mv "$HOME/.cargo" "$XDG_DATA_HOME/cargo"
fi
rustup default stable

[post-remove]
rm -rf "${RUSTUP_HOME:-$XDG_DATA_HOME/rustup}"
rm -rf "${CARGO_HOME:-$XDG_DATA_HOME/cargo}"